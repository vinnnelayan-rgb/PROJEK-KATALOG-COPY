<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katalog Perpustakaan</title>
  <link rel="stylesheet" href="css/style-admin.css" />
</head>

<body>
  <div class="container">
    <input type="checkbox" id="navToggle" class="nav-toggle" />
    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">

      <!-- LOGO -->
      <div class="logo">
        <a href="home-admin.html">
          <img src="src/logo mikro biru.webp" alt="Logo Mikro" />
        </a>
      </div>

      <!-- NAVIGATION -->
      <nav class="nav-menu">
        <ul>
          <li>
            <a href="#" id="themeToggle">
              <span>🌙</span> Dark Mode
            </a>
          </li>
          <li>
            <a href="admin-home.html">
              <span>🏠</span> Dashboard
            </a>
          </li>
          <li>
            <a href="admin-galeri.html">
              <span>🖼️</span> Galeri
            </a>
          </li>
          <li>
            <a href="admin-message.html" class="active">
              <span>💬</span> Message
            </a>
          </li>
          <li>
            <a href="index.html">
              <span>🚪</span> Logout
            </a>
          </li>
        </ul>
      </nav>

    </aside>


    <!-- ================= MAIN CONTENT ================= -->
    <div class="main-content">

      <header class="topbar">
        <h1>Message</h1>
        <!-- HUBERGER -->
        <label for="navToggle" class="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </label>
      </header>

      <main>

        <div class="gallery-header">
          <h2>Pesan Masuk User</h2>
          <p>Daftar pesan yang dikirim oleh User </p>
        </div>

        <!-- SEARCH -->
        <div class="gallery-controls">
          <input type="text" placeholder="Cari nama atau email..." />
          <select id="filterStatus">
            <option value="">Semua Pesan</option>
            <option value="Belum Dibaca">Belum Dibaca</option>
            <option value="Sudah Dibaca">Sudah Dibaca</option>
          </select>
        </div>

        <!-- TABLE -->
        <div class="card table-container">
          <table class="message-table">

            <thead>
              <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Subjek</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>

            <tbody id="messageTableBody"></tbody>

          </table>
        </div>

      </main>

    </div>
  </div>
  <div id="messagePopup" class="detail-popup">

    <div class="detail-content">

      <span id="closeMessagePopup">&times;</span>

      <h2>Pesan User</h2>

      <div id="messageDetail"></div>

    </div>

  </div>
  <script src="js/script.js"></script>
</body>

</html>
